<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediTrans — التوثيق التقني</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Loading bar -->
<div class="loading-bar"></div>

<!-- Background blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- Mobile overlay -->
<div class="sidebar-overlay" onclick="closeMobileSidebar()"></div>

<!-- ═══ SIDEBAR (right in RTL) ═══ -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">MediTrans <span>Docs</span></div>
    <div class="sidebar-version">v2.0 · أبريل 2026 · Stage 06/09</div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" class="search-input" placeholder="بحث في التوثيق...  ( / )">
    <span class="search-kbd">/</span>
    <div id="search-results" class="search-results"></div>
  </div>

  <nav class="sidebar-nav" id="sidebar-nav">
    <!-- Grouped nav built by app.js -->
  </nav>

  <div class="sidebar-footer">
    <div class="sf-stat"><span>جداول</span><span class="sf-val">11</span></div>
    <div class="sf-stat"><span>وحدات</span><span class="sf-val">7</span></div>
    <div class="sf-stat"><span>اختبارات</span><span class="sf-val">146</span></div>
    <div class="sf-stat"><span>ملفات اختبار</span><span class="sf-val">9</span></div>
  </div>
</aside>

<!-- ═══ TOC PANEL (left in RTL) ═══ -->
<aside class="toc-panel">
  <div class="toc-header">
    <span class="toc-header-icon">📑</span>
    في هذه الصفحة
  </div>
  <div id="toc-list" class="toc-list">
    <!-- Auto-generated by app.js -->
  </div>
  <div class="toc-footer">
    <div id="toc-meta" class="toc-page-meta">آخر تحديث: <span>—</span></div>
  </div>
</aside>

<!-- ═══ MAIN AREA (center) ═══ -->
<div class="main-area">

  <!-- Top bar -->
  <div class="top-bar">
    <button class="mobile-toggle" onclick="toggleMobileSidebar()">☰</button>
    <div class="breadcrumb">
      <span>MediTrans</span>
      <span class="bc-sep">/</span>
      <span class="bc-group" id="bc-group">بداية سريعة</span>
      <span class="bc-sep">/</span>
      <span class="bc-current" id="bc-current">النظرة العامة</span>
    </div>
  </div>

  <!-- Page content container -->
  <div id="app" class="page-content fade-in"></div>

  <!-- Footer -->
  <div class="main-footer">
    <p><span>MediTrans</span> — التوثيق التقني الاحترافي &nbsp;·&nbsp; v2.0 &nbsp;·&nbsp; أبريل 2026 &nbsp;·&nbsp; يُحدَّث مع كل مرحلة</p>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
